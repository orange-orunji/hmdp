server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql-hmdp:3306/hmdp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: <YOUR PASSWORD>
  redis:
    host: redis-hmdp
    port: 6379
    password: <YOUR PASSWORD>
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null 
mybatis-plus:
  type-aliases-package: com.hmdp.entity 
logging:
  level:
    com.hmdp: debug

    #redission配置
redisson:
  address: redis://redis-hmdp:6379
  password: <YOUR PASSWORD>
