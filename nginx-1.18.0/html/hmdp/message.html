<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>黑马点评 - 消息</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <link href="./css/info.css" rel="stylesheet">
  <style>
    .msg-item { display:flex; align-items:center; padding:14px 12px; border-bottom:1px solid #f1f1f1; cursor:pointer; }
    .msg-item:active { background:#f5f5f5; }
    .msg-item.unread { background:#fef8f0; }
    .msg-dot { width:8px; height:8px; border-radius:50%; background:#f63; margin-right:8px; flex-shrink:0; }
    .type-icon { font-size:18px; margin-right:10px; flex-shrink:0; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
    <div class="header-title">消息</div>
    <div class="header-share" @click="readAll" style="font-size:13px;line-height:44px;color:#f63;">全部已读</div>
  </div>
  <div style="height:calc(100% - 44px); overflow-y:auto;">
    <div v-if="messages.length === 0" style="text-align:center;color:#999;padding:60px 0;">暂无私信</div>
    <div v-for="m in messages" :key="m.userId" class="msg-item" :class="{unread: m.unreadCount > 0}" @click="goTo(m)">
      <span class="msg-dot" v-if="m.unreadCount > 0"></span>
      <img :src="m.icon || '/imgs/icons/default-icon.png'"
           style="width:36px;height:36px;border-radius:50%;margin-right:10px;flex-shrink:0;" alt="">
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:bold;">{{m.nickName}}</div>
        <div style="font-size:13px;color:#666;">{{m.lastContent}}</div>
      </div>
      <div style="font-size:11px;color:#999;flex-shrink:0;">{{formatTime(m.lastTime)}}</div>
    </div>

  </div>
  <foot-bar :active-btn="3"></foot-bar>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script src="./js/footer.js"></script>
<script>
  const app = new Vue({
    el: "#app",
    data: { messages: [] },
    created() {
      this.queryMessages();
      window.addEventListener("pageshow", this.queryMessages);
    },
    beforeDestroy() {
      window.removeEventListener("pageshow", this.queryMessages);
    },
    methods: {
      queryMessages() {
        axios.get("/message/conversations")
          .then(({data}) => this.messages = data || [])
          .catch(() => {})
      },
      readAll() {
        axios.put("/message/read-all")
          .then(() => {
            this.queryMessages();
            this.$message.success("已全部标为已读");
          })
          .catch(() => {})
      },
      goTo(m) {
        location.href = "/chat.html?id=" + m.userId;
      },
      goBack() { history.back(); },
      formatTime(t) {
        if (!t) return "";
        let d = new Date(t), now = new Date(), diff = now - d;
        if (diff < 60000) return "刚刚";
        if (diff < 3600000) return Math.floor(diff / 60000) + "分钟前";
        if (diff < 86400000) return Math.floor(diff / 3600000) + "小时前";
        return (d.getMonth()+1)+"月"+d.getDate()+"日";
      }
    }
  })
</script>
</body>
</html>
