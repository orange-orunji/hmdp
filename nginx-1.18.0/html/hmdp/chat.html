<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>私信</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { height:100vh; display:flex; flex-direction:column; background:#f5f5f5; }
    .chat-header { height:44px; display:flex; align-items:center; padding:0 12px; background:#fff; border-bottom:1px solid #eee; position:fixed; top:0; width:100%; z-index:10; }
    .chat-header .back { font-size:20px; margin-right:10px; cursor:pointer; }
    .chat-header .name { font-size:16px; font-weight:bold; }
    .chat-body { flex:1; overflow-y:auto; padding:60px 12px 72px; }
    .msg-row { display:flex; margin-bottom:16px; }
    .msg-row.mine { flex-direction:row-reverse; }
    .msg-avatar { width:36px; height:36px; border-radius:50%; flex-shrink:0; }
    .msg-bubble { max-width:70%; padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.5; word-break:break-all; }
    .msg-row.other .msg-bubble { background:#fff; margin-left:10px; border-top-left-radius:4px; }
    .msg-row.mine .msg-bubble { background:#95ec69; margin-right:10px; border-top-right-radius:4px; }
    .msg-time { text-align:center; font-size:11px; color:#999; margin:8px 0; }
    .chat-input { position:fixed; bottom:0; width:100%; display:flex; padding:10px; background:#fff; border-top:1px solid #eee; gap:8px; }
    .chat-input input { flex:1; border:1px solid #e1e2e3; border-radius:20px; padding:8px 15px; outline:none; font-size:14px; }
  </style>
</head>
<body>
<div id="app">
  <div class="chat-header">
    <span class="back" @click="goBack">←</span>
    <img :src="targetUser.icon || '/imgs/icons/default-icon.png'" style="width:30px;height:30px;border-radius:50%;margin-right:8px;" alt="">
    <span class="name">{{targetUser.nickName}}</span>
  </div>
  <div class="chat-body" ref="chatBody">
    <div v-if="messages.length===0" style="text-align:center;color:#999;padding-top:100px;">开始聊天吧</div>
    <template v-for="(m, i) in messages">
      <div class="msg-time" v-if="showTime(m, i)">{{formatTime(m.createTime)}}</div>
      <div class="msg-row" :class="m.isMine ? 'mine' : 'other'">
        <img :src="m.isMine ? (myIcon || '/imgs/icons/default-icon.png') : (targetUser.icon || '/imgs/icons/default-icon.png')" class="msg-avatar" alt="">
        <div class="msg-bubble">{{m.content}}</div>
      </div>
    </template>
  </div>
  <div class="chat-input">
    <input v-model="inputText" @keyup.enter="sendMsg" placeholder="输入消息..." maxlength="500">
    <el-button type="danger" size="small" round @click="sendMsg" :disabled="!inputText.trim()">发送</el-button>
  </div>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script>
  const app = new Vue({
    el: "#app",
    data: {
      util,
      targetUser: {},
      myIcon: "",
      messages: [],
      inputText: "",
      timer: null
    },
    created() {
      let id = util.getUrlParam("id");
      axios.get("/user/" + id).then(({data}) => {
        this.targetUser = data;
      });
      axios.get("/user/me").then(({data}) => { this.myIcon = data.icon; });
      this.loadMessages();
      this.timer = setInterval(() => this.loadMessages(), 3000);
    },
    beforeDestroy() { if (this.timer) clearInterval(this.timer); },
    methods: {
      loadMessages() {
        let id = util.getUrlParam("id");
        axios.get("/message/chat/" + id)
          .then(({data}) => { this.messages = data || []; this.$nextTick(() => this.scrollBottom()); })
          .catch(() => {});
      },
      sendMsg() {
        if (!this.inputText.trim()) return;
        let id = util.getUrlParam("id");
        axios.post("/message", { receiverId: Number(id), content: this.inputText.trim() })
          .then(() => { this.inputText = ""; this.loadMessages(); })
          .catch(err => this.$message.error(err));
      },
      scrollBottom() {
        let el = this.$refs.chatBody;
        if (el) el.scrollTop = el.scrollHeight;
      },
      showTime(m, i) {
        if (i === 0) return true;
        let prev = new Date(this.messages[i-1].createTime).getTime();
        let cur = new Date(m.createTime).getTime();
        return cur - prev > 300000;
      },
      formatTime(t) {
        let d = new Date(t);
        return (d.getMonth()+1)+"月"+d.getDate()+"日 "+d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
      },
      goBack() { history.back(); }
    }
  })
</script>
</body>
</html>
